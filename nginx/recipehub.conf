# =============================================
# BLOQUE 1: Redirigir HTTP → HTTPS (ambos subdominios)
# =============================================
server {
    listen 80;
    server_name api.recipehub.me app.recipehub.me;
    return 301 https://$host$request_uri;
}

# =============================================
# BLOQUE 2: Backend API — api.recipehub.me
# =============================================
server {
    listen 443 ssl;
    server_name api.recipehub.me;

    ssl_certificate /etc/letsencrypt/live/api.recipehub.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.recipehub.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# =============================================
# BLOQUE 3: Frontend React SPA — app.recipehub.me
# =============================================
server {
    listen 443 ssl;
    server_name app.recipehub.me;

    ssl_certificate /etc/letsencrypt/live/app.recipehub.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.recipehub.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Directorio del build de React
    root /var/www/recipehub/frontend/dist;
    index index.html;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # SPA routing — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
