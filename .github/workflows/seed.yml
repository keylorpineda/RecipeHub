name: Seed — Poblar DB con recetas demo

# Se activa solo manualmente desde GitHub → Actions → "Run workflow"
on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar seed via SSH en el VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: MONGO_URI
          script: |
            set -e
            cd /root/recipehub

            echo "🌱 Ejecutando seed de recetas con imágenes..."

            # Correr el seed dentro del contenedor de la API
            # El contenedor ya tiene ts-node instalado como devDependency
            docker compose exec -T api sh -c "MONGO_URI=$MONGO_URI npx ts-node src/scripts/seed.ts"

            echo "✅ Seed completado"
