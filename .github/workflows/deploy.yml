name: Deploy RecipeHub

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del backend
        run: cd backend && npm ci --ignore-scripts

      - name: Compilar TypeScript
        run: cd backend && npm run build

      - name: Correr tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_for_ci
          MONGO_URI: mongodb://localhost:27017/recipehub_test
          PORT: 4000

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy por SSH al VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /root/recipehub
            git pull origin main

            # Crear .env con los 5 secrets — nunca aparecen en logs
            cat > .env << 'ENVEOF'
            PORT=4000
            MONGO_INITDB_ROOT_USERNAME=mongo_user
            MONGO_INITDB_ROOT_PASSWORD=mongo_pass_seguro
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            FRONTEND_URL=https://app.recipehub.me
            NODE_ENV=production
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            ENVEOF

            # Build del frontend — VITE_API_URL debe estar presente en tiempo de build
            cd frontend
            echo "VITE_API_URL=https://api.recipehub.me" > .env
            npm ci
            npm run build
            cd ..

            # Copiar build al directorio de Nginx
            mkdir -p /var/www/recipehub/frontend
            cp -r frontend/dist /var/www/recipehub/frontend/

            # Levantar contenedores
            docker compose down
            docker compose up -d --build

            # Esperar que MongoDB y la API arranquen completamente
            sleep 30

            # Health check con reintentos
            for i in 1 2 3 4 5; do
              echo "Health check intento $i..."
              if curl -f https://api.recipehub.me/api/health; then
                echo "✅ Deploy completado exitosamente"
                exit 0
              fi
              sleep 10
            done

            echo "❌ Health check falló después de 5 intentos"
            exit 1
